services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - backend_fuse-network
      - notifications_notifications-network
networks:
  backend_fuse-network:
    external: true
  notifications_notifications-network:
    external: true
