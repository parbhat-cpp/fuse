services:
  notifications:
    image: fusecons.azurecr.io/fuse-notifications:latest
    container_name: notifications-prod
    environment:
      NODE_ENV: production
    ports:
      - 8000:3000
    env_file:
      - .env
    depends_on:
      - redis-notifications
    networks:
      - notifications-network
      - backend_fuse-network
  redis-notifications:
    container_name: redis-notifications
    image: redis:7-alpine
    env_file:
      - .env
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0
    volumes:
      - redis-notifications-data:/data
    networks:
      - notifications-network
volumes:
  redis-notifications-data:
networks:
  notifications-network:
    external: true
    name: notifications_notifications-network
  backend_fuse-network:
    external: true
