name: Deploy to Azure VM

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: fusecons.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker images
        env:
          REGISTRY: fusecons.azurecr.io
          IMAGE_TAG: ${{ github.sha }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_SUPABASE_AUTH_KEY: ${{ secrets.VITE_SUPABASE_AUTH_KEY }}
          VITE_HOST: ${{ secrets.VITE_HOST }}

          NODE_ENV: ${{ secrets.NODE_ENV }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}

          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_YT_API_KEY: ${{ secrets.VITE_YT_API_KEY }}

          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_RAZORPAY_KEY_SECRET: ${{ secrets.VITE_RAZORPAY_KEY_SECRET }}
        run: |
          bash build_push.sh

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "${{ secrets.ACR_PASSWORD }}" | docker login fusecons.azurecr.io \
              -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            cd /home/${{ secrets.AZURE_USER }}/fuse

            git pull origin main

            bash deploy.sh
